<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECC IPVM 46 - Gestão</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>ECC IPVM 46 - Painel de Controle</h1>
    <nav>
        <button class="tab-btn active" data-tab="cadastro">1. Cadastros Base</button>
        <button class="tab-btn" data-tab="cronograma">2. Cronograma Geral</button>
        <button class="tab-btn" data-tab="sabado">Execução Sábado</button>
        <button class="tab-btn" data-tab="domingo">Execução Domingo</button>
        <button class="tab-btn" data-tab="resumo">Resumo Geral</button>
        <button class="tab-btn" data-tab="timeline">Timeline</button>
    </nav>
</header>

<!-- 1. ABA CADASTRO -->
<section id="cadastro" class="tab-content active">
    <h2>Cadastros Base (Parâmetros)</h2>
    <p class="instrucao">Inclua, altere ou exclua cada item individualmente.</p>
    
    <div class="cadastro-container">
        <!-- LOCAL -->
        <div class="cad-linha">
            <div class="cad-input-area">
                <label>Local:</label>
                <input type="text" id="in-local" placeholder="Ex: Salão">
                <button class="btn-incluir" onclick="addBase('locais', 'in-local')">Incluir</button>
            </div>
            <div id="lista-locais" class="cad-lista"></div>
        </div>

        <!-- EQUIPE -->
        <div class="cad-linha">
            <div class="cad-input-area">
                <label>Equipe:</label>
                <input type="text" id="in-equipe" placeholder="Ex: Logística">
                <button class="btn-incluir" onclick="addBase('equipes', 'in-equipe')">Incluir</button>
            </div>
            <div id="lista-equipes" class="cad-lista"></div>
        </div>

        <!-- ATIVIDADE -->
        <div class="cad-linha">
            <div class="cad-input-area">
                <label>Atividade:</label>
                <input type="text" id="in-atividade" placeholder="Ex: Jantar">
                <button class="btn-incluir" onclick="addBase('atividades', 'in-atividade')">Incluir</button>
            </div>
            <div id="lista-atividades" class="cad-lista"></div>
        </div>

        <!-- AÇÃO -->
        <div class="cad-linha">
            <div class="cad-input-area">
                <label>Ação:</label>
                <input type="text" id="in-acao" placeholder="Ex: Preparar">
                <button class="btn-incluir" onclick="addBase('acoes', 'in-acao')">Incluir</button>
            </div>
            <div id="lista-acoes" class="cad-lista"></div>
        </div>
    </div>
</section>

<!-- 2. ABA CRONOGRAMA -->
<section id="cronograma" class="tab-content">
    <h2>Cronograma Geral</h2>
    
    <!-- Formulário de Inclusão/Alteração -->
    <form id="cronogramaForm" class="form-crono">
        <input type="hidden" id="crono-id"> <!-- Campo oculto para saber se está alterando -->
        
        <div class="grid-crono">
            <div><label>Dia:</label><select id="crono-dia" required><option value="sabado">Sábado</option><option value="domingo">Domingo</option></select></div>
            <div><label>Atividade:</label><select id="crono-atividade" required></select></div>
            <div><label>Equipe:</label><select id="crono-equipe" required></select></div>
            <div><label>Local:</label><select id="crono-local" required></select></div>
            <div><label>Ação:</label><select id="crono-acao" required></select></div>
            <div><label>Hora Início:</label><input type="time" id="crono-inicio" required></div>
            <div><label>Hora Fim:</label><input type="time" id="crono-fim" required></div>
            <div style="grid-column: span 2;"><label>Observação:</label><input type="text" id="crono-obs"></div>
            <div class="btn-align"><button type="submit" id="btn-salvar-crono" class="btn-incluir">Incluir no Cronograma</button></div>
        </div>
    </form>

    <!-- Tabela Linha a Linha -->
    <div class="table-responsive">
        <table class="tabela-gerencial">
            <thead>
                <tr>
                    <th>Nº</th>
                    <th>Dia</th>
                    <th>Atividade</th>
                    <th>Equipe</th>
                    <th>Início</th>
                    <th>Fim</th>
                    <th>Tempo</th>
                    <th>Observação</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-cronograma-body"></tbody>
        </table>
    </div>
</section>

<!-- 3. ABA SÁBADO -->
<section id="sabado" class="tab-content">
    <h2>Execução — Sábado</h2>
    <div id="listaSabado" class="cards-container"></div>
</section>

<!-- 4. ABA DOMINGO -->
<section id="domingo" class="tab-content">
    <h2>Execução — Domingo</h2>
    <div id="listaDomingo" class="cards-container"></div>
</section>

<!-- 5. RESUMO GERAL -->
<section id="resumo" class="tab-content">
    <h2>Resumo Gerencial</h2>
    <div id="resumoContainer"></div>
</section>

<!-- 6. TIMELINE -->
<section id="timeline" class="tab-content">
    <h2>Timeline do Evento</h2>
    <div class="filter-bar">
        <label>Visualizar Dia:</label>
        <select id="timeline-dia" onchange="renderAll()">
            <option value="sabado">Sábado</option>
            <option value="domingo">Domingo</option>
        </select>
    </div>
    <div id="timelineContainer"></div>
</section>

<script src="js/app.js"></script>
</body>
</html>
