<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECC IPVM 46</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <header>
        <h1>ECC IPVM 46</h1>
        <nav>
            <button class="tab-btn" data-tab="cadastro">Cadastro</button>
            <button class="tab-btn" data-tab="cronograma">Cronograma</button>
            <button class="tab-btn" data-tab="sabado">Visão Sábado</button>
            <button class="tab-btn" data-tab="domingo">Visão Domingo</button>
        </nav>
    </header>

    <!-- ABA CADASTRO -->
    <section id="cadastro" class="tab-content">
        <h2>Cadastro de Atividades</h2>

        <form id="cadastroForm">

            <label>Dia:</label>
            <select id="cad-dia" required>
                <option value="">Selecione</option>
                <option value="sabado">Sábado</option>
                <option value="domingo">Domingo</option>
            </select>

            <label>Local:</label>
            <select id="cad-local" required>
                <option value="">Selecione</option>
                <option>Salão</option>
                <option>Dormitório</option>
                <option>Capela</option>
                <option>Recepção</option>
                <option>Limpeza</option>
            </select>

            <label>Equipe:</label>
            <select id="cad-equipe" required>
                <option value="">Selecione</option>
                <option>Logística</option>
                <option>Recepção</option>
                <option>Limpeza</option>
                <option>Alimentação</option>
                <option>Acolhimento</option>
            </select>

            <label>Atividade:</label>
            <select id="cad-atividade" required>
                <option value="">Selecione</option>
                <option>Jantar</option>
                <option>Dinâmica</option>
                <option>Deslocamento</option>
                <option>Formação</option>
                <option>Café</option>
            </select>

            <label>Ação:</label>
            <select id="cad-acao" required>
                <option value="">Selecione</option>
                <option>Receber</option>
                <option>Treinar</option>
                <option>Organizar</option>
                <option>Preparar</option>
            </select>

            <button type="submit">Salvar</button>
        </form>

        <div id="cadastroLista"></div>
    </section>

    <!-- ABA CRONOGRAMA -->
    <section id="cronograma" class="tab-content">
        <h2>Montar Cronograma</h2>

        <form id="cronogramaForm">

            <label>Dia:</label>
            <select id="crono-dia" required>
                <option value="">Selecione</option>
                <option value="sabado">Sábado</option>
                <option value="domingo">Domingo</option>
            </select>

            <label>Atividade (do cadastro):</label>
            <select id="crono-atividade" required></select>

            <label>Horário Início:</label>
            <input type="time" id="crono-inicio" required>

            <label>Horário Fim:</label>
            <input type="time" id="crono-fim" required>

            <label>Local:</label>
            <input type="text" id="crono-local" placeholder="Ex: Salão" required>

            <label>Observação:</label>
            <input type="text" id="crono-obs" placeholder="Opcional">

            <button type="submit">Adicionar ao Cronograma</button>
        </form>

        <div id="cronogramaLista"></div>
    </section>

    <!-- VISÃO SÁBADO -->
    <section id="sabado" class="tab-content">
        <h2>Cronograma — Sábado</h2>
        <div id="listaSabado"></div>
    </section>

    <!-- VISÃO DOMINGO -->
    <section id="domingo" class="tab-content">
        <h2>Cronograma — Domingo</h2>
        <div id="listaDomingo"></div>
    </section>

    <script src="js/app.js"></script>

</body>
</html>
