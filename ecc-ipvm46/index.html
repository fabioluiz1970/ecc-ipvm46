<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECC – IPVM 46</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="topo">
    <img src="img/logo-ecc.png" alt="Logo ECC" class="logo">
    <h1>ECC – IPVM 46</h1>
</header>

<nav>
    <button data-target="cronograma">Cronograma</button>
    <button data-target="dashboard">Dashboard</button>
    <button data-target="timeline">Timeline</button>
    <button data-target="acoes">Ações</button>
    <button data-target="impressao">Impressão</button>
    <button data-target="link">Link / QRCode</button>
</nav>

<main>

<section id="cronograma" class="modulo hidden">
    <h2>Cronograma Geral</h2>

    <div class="card">
        <h3>Adicionar Atividade</h3>

        <label>Dia</label>
        <select id="dia">
            <option value="Sábado">Sábado</option>
            <option value="Domingo">Domingo</option>
        </select>

        <label>Início previsto</label>
        <input type="time" id="iniPrev">

        <label>Fim previsto</label>
        <input type="time" id="fimPrev">

        <label>Atividade</label>
        <input type="text" id="atividade">

        <label>Local</label>
        <input type="text" id="local">

        <label>Observações</label>
        <input type="text" id="obs">

        <button class="btn-primary" onclick="adicionarAtividade()">Salvar Atividade</button>
    </div>

    <div id="listaCrono"></div>
</section>

<section id="dashboard" class="modulo hidden"></section>
<section id="timeline" class="modulo hidden"></section>
<section id="acoes" class="modulo hidden"></section>
<section id="impressao" class="modulo hidden"></section>
<section id="link" class="modulo hidden"></section>

</main>

<div id="login-modal" class="modal">
    <div class="modal-box">
        <h2>Acesso ao Sistema</h2>

        <label>Perfil</label>
        <select id="login-perfil">
            <option value="visitante">Visitante</option>
            <option value="equipe">Equipe</option>
            <option value="admin">Admin</option>
        </select>

        <label>Senha</label>
        <input type="password" id="login-senha">

        <button id="btn-login">Entrar</button>
        <p id="login-erro" class="erro"></p>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
